<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XML HTTP Request</title>

    <style>
        body{
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .card {
            /* Add shadows to create the "card" effect */
            box-shadow: 0 4px 8px 0 rgba(0,0,0,0.2);
            transition: 0.3s;
            border-radius: 5px;
            width: 300px;
        }

        /* On mouse-over, add a deeper shadow */
        .card:hover {
            box-shadow: 0 8px 16px 0 rgba(0,0,0,0.2);
        }

        /* Add some padding inside the card container */
        .container {
            padding: 2px 16px;
        }

        /* Add rounded corners to the top left and the top right corner of the image */
        img {
            border-radius: 5px 5px 0 0;
        }
    </style>
</head>
<body style="background-color: #dfdede">
    <h1>Github Profile</h1>
    <div class="card" id="card"></div>
</body>
<script>
    const requestUrl = 'https://api.github.com/users/izzanaseer'
    const xhr = new XMLHttpRequest();
    xhr.open('GET', requestUrl)
    xhr.onreadystatechange = function(){
        console.log(xhr.readyState);
        if (xhr.readyState === 4) {
            const data = JSON.parse(this.responseText)
            console.log(typeof data);

            const userCard = document.getElementById('card');
            userCard.innerHTML = `
                <img src=${data.avatar_url} alt="Avatar" style="width:100%">
                <div class="container">
                    <h4>${data.name}</h4>
                    <p>Followers: ${data.followers}</p>
                </div>
            `;
        }
    }
    xhr.send();
</script>
</html>
